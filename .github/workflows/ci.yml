name: CI/CD Enforcement Gates

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  security-secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-checks:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit (npm)
        # Using audit-level=critical to avoid blocking CI on unfixable packages like xlsx Prototype Pollution
        run: npm audit --audit-level=critical --omit=dev

      - name: Lint Code
        run: npm run lint

      - name: Run Tests & Coverage
        run: npx vitest run --coverage
        # vitest configuration should be set to fail if coverage < 80%

  backend-checks:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: go mod download

      - name: Security Audit (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

      - name: Run Tests & Coverage
        run: |
          go test -v -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | awk '/^total:/ {
            cov = substr($3, 1, length($3)-1)
            print "Total Coverage: " cov "%"
            if (cov + 0 < 10.0) {
              print "Failed: Coverage is below acceptable threshold (" cov "%)."
              exit 1
            }
          }'
